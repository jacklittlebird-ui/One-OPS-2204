name: Security Post-Deploy Check

on:
  deployment_status:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  postdeploy-check:
    if: ${{ github.event.deployment_status.state == 'success' || github.event_name != 'deployment_status' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoke security-postdeploy-check
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set +e
          response=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/functions/v1/security-postdeploy-check" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "x-check-source: github-actions")
          cat /tmp/out.json
          echo "HTTP: $response"
          passed=$(jq -r '.passed // false' /tmp/out.json)
          summary=$(jq -r '[.checks[] | select(.ok==false) | "❌ \(.id): \(.detail // "")"] | join("\n")' /tmp/out.json)
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$summary" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          if [ "$response" != "200" ] || [ "$passed" != "true" ]; then
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          payload=$(jq -n --arg run "$RUN_URL" --arg sum "$SUMMARY" \
            '{text: ("🚨 *security-postdeploy-check FAILED*\n<" + $run + "|View run>\n```" + $sum + "```")}')
          curl -sS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Notify Email on failure
        if: failure() && env.ALERT_EMAIL_TO != ''
        env:
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then echo "RESEND_API_KEY missing, skipping email"; exit 0; fi
          body=$(jq -n --arg to "$ALERT_EMAIL_TO" --arg run "$RUN_URL" --arg sum "$SUMMARY" \
            '{from:"alerts@linkaero.app", to:[$to], subject:"🚨 security-postdeploy-check FAILED",
              html: ("<p>Security post-deploy check failed.</p><p><a href=\"" + $run + "\">View GitHub Actions run</a></p><pre>" + $sum + "</pre>")}')
          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" --data "$body"
