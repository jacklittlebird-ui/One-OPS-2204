name: Force Sync from linkaero-5c6dd1f1 to One-OPS-2204

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout empty workspace
        run: |
          git init

      - name: Add source repo
        run: |
          git remote add source https://github.com/jacklittlebird-ui/linkaero-5c6dd1f1.git
          git fetch source
          git checkout -B main source/main

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Push to One-OPS-2204
        run: |
          git remote add target https://github.com/jacklittlebird-ui/One-OPS-2204.git
          git push target main --force
